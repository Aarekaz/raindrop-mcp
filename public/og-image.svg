<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Raindrop MCP social preview</title>
  <desc id="desc">A social preview card for Raindrop MCP showing saved bookmarks connected to AI clients.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcfd"/>
      <stop offset="0.55" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#eff8f2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#095ee8"/>
      <stop offset="1" stop-color="#0744a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101624" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d8dee8" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#page)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <g transform="translate(72 66)">
    <rect x="0" y="0" width="1056" height="498" rx="32" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0.5" y="0.5" width="1055" height="497" rx="31.5" fill="none" stroke="#d8dee8"/>

    <g transform="translate(52 50)">
      <rect x="0" y="0" width="160" height="42" rx="21" fill="#eaf2ff" stroke="#bfd6ff"/>
      <circle cx="25" cy="21" r="8" fill="#095ee8"/>
      <text x="44" y="27" fill="#095ee8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">RAINDROP MCP</text>

      <text x="0" y="126" fill="#101624" font-family="Arial, Helvetica, sans-serif" font-size="63" font-weight="800">Your saved web,</text>
      <text x="0" y="198" fill="#101624" font-family="Arial, Helvetica, sans-serif" font-size="63" font-weight="800">available to your AI</text>

      <text x="0" y="258" fill="#536073" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="500">Bookmarks, collections, tags, and highlights</text>
      <text x="0" y="296" fill="#536073" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="500">through an OAuth-aware MCP server.</text>

      <g transform="translate(0 356)">
        <rect x="0" y="0" width="150" height="44" rx="22" fill="#eef7f2" stroke="#cadfd3"/>
        <text x="22" y="29" fill="#1d6b43" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Cloudflare</text>
        <rect x="166" y="0" width="114" height="44" rx="22" fill="#fff8e7" stroke="#ead69b"/>
        <text x="189" y="29" fill="#7a5a00" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">OAuth</text>
        <rect x="296" y="0" width="96" height="44" rx="22" fill="#eaf2ff" stroke="#bfd6ff"/>
        <text x="325" y="29" fill="#095ee8" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">MCP</text>
      </g>
    </g>

    <g transform="translate(650 78)">
      <rect x="0" y="0" width="322" height="342" rx="28" fill="url(#blue)"/>
      <rect x="26" y="28" width="270" height="64" rx="16" fill="#ffffff" opacity="0.96"/>
      <rect x="48" y="48" width="126" height="10" rx="5" fill="#095ee8"/>
      <rect x="48" y="66" width="202" height="8" rx="4" fill="#aeb8c8"/>

      <rect x="26" y="116" width="270" height="64" rx="16" fill="#ffffff" opacity="0.9"/>
      <rect x="48" y="136" width="168" height="10" rx="5" fill="#1d6b43"/>
      <rect x="48" y="154" width="186" height="8" rx="4" fill="#aeb8c8"/>

      <rect x="26" y="204" width="270" height="64" rx="16" fill="#ffffff" opacity="0.84"/>
      <rect x="48" y="224" width="112" height="10" rx="5" fill="#7a5a00"/>
      <rect x="48" y="242" width="218" height="8" rx="4" fill="#aeb8c8"/>

      <path d="M75 300 C120 262 166 262 211 300" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
      <circle cx="75" cy="300" r="11" fill="#ffffff"/>
      <circle cx="211" cy="300" r="11" fill="#ffffff"/>
      <circle cx="143" cy="277" r="13" fill="#3dff9f"/>

      <g transform="translate(229 279)">
        <rect x="0" y="0" width="52" height="52" rx="16" fill="#ffffff" opacity="0.96"/>
        <text x="13" y="34" fill="#095ee8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">AI</text>
      </g>
    </g>
  </g>
</svg>
